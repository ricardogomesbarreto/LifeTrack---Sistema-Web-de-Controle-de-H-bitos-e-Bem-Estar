<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeTrack - Perfil do Usuário</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0fff4 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .perfil-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 204, 113, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
        }

        h2 i {
            color: #2ecc71;
        }

        .foto-perfil {
            text-align: center;
            margin-bottom: 30px;
        }

        .foto-perfil img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #2ecc71;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.3);
        }

        .upload-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px dashed #2ecc71;
        }

        .upload-form label {
            display: block;
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 500;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            background: white;
            cursor: pointer;
        }

        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            background: #2ecc71;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn-upload {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-upload:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .info-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 40px;
            height: 40px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2ecc71;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c3e50;
        }

        .acoes {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2ecc71;
            color: white;
        }

        .btn-primary:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #2c3e50;
            border: 2px solid #2ecc71;
        }

        .btn-secondary:hover {
            background: #2ecc71;
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .perfil-container {
                padding: 20px;
            }

            .acoes {
                flex-direction: column;
            }

            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="perfil-container">
        <h2>
            <i class="fas fa-user-circle"></i>
            Meu Perfil
        </h2>

        <div class="foto-perfil">
            <img src="{{ url_for('static', filename='fotos_perfil/' + (foto_url if foto_url else 'default.png')) }}" 
                 alt="Foto de Perfil">
        </div>

        <div class="upload-form">
            <form action="{{ url_for('upload_foto') }}" method="POST" enctype="multipart/form-data">
                <label for="foto_perfil">
                    <i class="fas fa-camera"></i>
                    Escolha uma nova foto de perfil
                </label>
                
                <div class="file-input-wrapper">
                    <input type="file" name="foto_perfil" accept="image/*" required>
                </div>
                
                <button type="submit" class="btn-upload">
                    <i class="fas fa-upload"></i>
                    Enviar Foto
                </button>
            </form>
        </div>

        <div class="info-section">
            <div class="info-item">
                <div class="info-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="info-content">
                    <div class="info-label">Nome completo</div>
                    <div class="info-value">{{ nome }}</div>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="info-content">
                    <div class="info-label">E-mail</div>
                    <div class="info-value">{{ email }}</div>
                </div>
            </div>
        </div>

        <div class="acoes">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>
                Voltar
            </a>
        </div>
    </div>
</body>
</html>
