{% extends "base.html" %}

{% block title %}LifeTrack - Login{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #2c3e50;">
        <i class="fas fa-leaf" style="color: #2ecc71; margin-right: 10px;"></i>
        Bem-vindo de volta!
    </h2>

    {% if msg %}
        <div class="msg msg-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ msg }}
        </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="email">
                <i class="fas fa-envelope"></i> E-mail
            </label>
            <input type="email" class="form-control" id="email" name="email" 
                   placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label for="senha">
                <i class="fas fa-lock"></i> Senha
            </label>
            <input type="password" class="form-control" id="senha" name="senha" 
                   placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">
            <i class="fas fa-sign-in-alt"></i> Entrar
        </button>

        <p style="text-align: center; margin-top: 1rem;">
            Não tem uma conta? 
            <a href="{{ url_for('cadastro') }}" style="color: #2ecc71; text-decoration: none; font-weight: 500;">
                Cadastre-se
            </a>
        </p>
    </form>
</div>
{% endblock %}
