{% extends "base.html" %}

{% block title %}LifeTrack - Cadastro{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(46, 204, 113, 0.15); padding: 2.5rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="background: rgba(46, 204, 113, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
            <i class="fas fa-user-plus" style="font-size: 2.5rem; color: #2ecc71;"></i>
        </div>
        <h2 style="color: #2c3e50; font-size: 1.8rem; font-weight: 600;">Criar nova conta</h2>
        <p style="color: #666; margin-top: 0.5rem;">Comece sua jornada de hábitos saudáveis</p>
    </div>

    {% if msg %}
        <div class="msg msg-error" style="background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-exclamation-circle"></i>
            {{ msg }}
        </div>
    {% endif %}

    <form method="POST">
        <div style="margin-bottom: 1.5rem;">
            <label for="nome" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #2c3e50;">
                <i class="fas fa-user" style="color: #2ecc71; margin-right: 5px;"></i>
                Nome Completo
            </label>
            <div style="position: relative;">
                <i class="fas fa-user" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #2ecc71; opacity: 0.7;"></i>
                <input type="text" name="nome" 
                       style="width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem; transition: all 0.3s; background: #f8f9fa;"
                       placeholder="Digite seu nome completo" 
                       required
                       onfocus="this.style.borderColor='#2ecc71'; this.style.boxShadow='0 0 0 3px rgba(46,204,113,0.1)'; this.style.background='white';"
                       onblur="this.style.borderColor='#e9ecef'; this.style.boxShadow='none'; this.style.background='#f8f9fa';">
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #2c3e50;">
                <i class="fas fa-envelope" style="color: #2ecc71; margin-right: 5px;"></i>
                E-mail
            </label>
            <div style="position: relative;">
                <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #2ecc71; opacity: 0.7;"></i>
                <input type="email" name="email" 
                       style="width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem; transition: all 0.3s; background: #f8f9fa;"
                       placeholder="seu@email.com" 
                       required
                       onfocus="this.style.borderColor='#2ecc71'; this.style.boxShadow='0 0 0 3px rgba(46,204,113,0.1)'; this.style.background='white';"
                       onblur="this.style.borderColor='#e9ecef'; this.style.boxShadow='none'; this.style.background='#f8f9fa';">
            </div>
        </div>

        <div style="margin-bottom: 2rem;">
            <label for="senha" style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #2c3e50;">
                <i class="fas fa-lock" style="color: #2ecc71; margin-right: 5px;"></i>
                Senha
            </label>
            <div style="position: relative;">
                <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #2ecc71; opacity: 0.7;"></i>
                <input type="password" name="senha" 
                       style="width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 1rem; transition: all 0.3s; background: #f8f9fa;"
                       placeholder="Mínimo 6 caracteres" 
                       minlength="6" required
                       onfocus="this.style.borderColor='#2ecc71'; this.style.boxShadow='0 0 0 3px rgba(46,204,113,0.1)'; this.style.background='white';"
                       onblur="this.style.borderColor='#e9ecef'; this.style.boxShadow='none'; this.style.background='#f8f9fa';">
            </div>
            <small style="display: block; margin-top: 0.5rem; color: #666;">
                <i class="fas fa-info-circle" style="color: #2ecc71;"></i> Use pelo menos 6 caracteres
            </small>
        </div>

        <button type="submit" 
                style="width: 100%; padding: 14px; background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1.5rem;">
            <i class="fas fa-check-circle"></i>
            Criar conta
        </button>

        <div style="text-align: center; position: relative; margin: 1.5rem 0;">
            <hr style="border: none; border-top: 1px solid #e9ecef;">
            <span style="position: relative; top: -12px; background: white; padding: 0 15px; color: #666;">já tem uma conta?</span>
        </div>

        <p style="text-align: center;">
            <a href="{{ url_for('login') }}" 
               style="color: #2ecc71; text-decoration: none; font-weight: 600; transition: all 0.3s; border-bottom: 2px solid transparent;"
               onmouseover="this.style.borderBottomColor='#2ecc71'"
               onmouseout="this.style.borderBottomColor='transparent'">
                <i class="fas fa-sign-in-alt" style="margin-right: 5px;"></i>
                Faça login
            </a>
        </p>
    </form>
</div>

<style>
    .card {
        animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    input::placeholder {
        color: #adb5bd;
        font-weight: 300;
    }
    
    input:focus {
        outline: none;
    }
</style>
{% endblock %}
