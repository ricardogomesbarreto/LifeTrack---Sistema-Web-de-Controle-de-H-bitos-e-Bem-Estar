{% extends "base.html" %}

{% block title %}LifeTrack - Cadastro{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #2c3e50;">
        <i class="fas fa-user-plus" style="color: #2ecc71; margin-right: 10px;"></i>
        Criar Nova Conta
    </h2>

    {% if msg %}
        <div class="msg msg-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ msg }}
        </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="nome">
                <i class="fas fa-user"></i> Nome Completo
            </label>
            <input type="text" class="form-control" id="nome" name="nome" 
                   placeholder="Digite seu nome" required>
        </div>

        <div class="form-group">
            <label for="email">
                <i class="fas fa-envelope"></i> E-mail
            </label>
            <input type="email" class="form-control" id="email" name="email" 
                   placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label for="senha">
                <i class="fas fa-lock"></i> Senha
            </label>
            <input type="password" class="form-control" id="senha" name="senha" 
                   placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">
            <i class="fas fa-check-circle"></i> Cadastrar
        </button>

        <p style="text-align: center; margin-top: 1rem;">
            Já tem uma conta? 
            <a href="{{ url_for('login') }}" style="color: #2ecc71; text-decoration: none; font-weight: 500;">
                Faça login
            </a>
        </p>
    </form>
</div>
{% endblock %}
